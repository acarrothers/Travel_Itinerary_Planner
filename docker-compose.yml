services:
  db:
    image: postgres:16-alpine
    container_name: trip-itinerary-db
    environment:
      POSTGRES_USER: tripplanner
      POSTGRES_PASSWORD: tripplanner
      POSTGRES_DB: tripplanner
    ports:
      - "5432:5432"
    volumes:
      - tripplanner_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripplanner -d tripplanner"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trip-itinerary-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tripplanner:tripplanner@db:5432/tripplanner
      PORT: "4000"
    ports:
      - "4000:4000"

volumes:
  tripplanner_pgdata:
